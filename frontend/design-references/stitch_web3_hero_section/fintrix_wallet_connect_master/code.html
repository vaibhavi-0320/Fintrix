<!DOCTYPE html>

              "surface-tint": "#c6c6c7",

<style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            font-family: 'Inter', sans-serif;
        }
        .obsidian-card {
            background: linear-gradient(145deg, #0e0e0e 0%, #131313 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .obsidian-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .text-gradient {
            background: linear-gradient(45deg, #ffffff 0%, #919191 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .general-sans {
            font-family: 'Manrope', sans-serif;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden">
<!-- Header / Branding Suppressed for Auth according to Shell Logic -->
<main class="flex-grow flex items-center justify-center px-6 relative">
<!-- Background Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-md z-10">
<!-- Logo Section -->
<div class="flex justify-center mb-12">
<div class="relative group">
<div class="absolute -inset-1 bg-white/10 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
<img class="relative h-20 w-20 object-contain" data-alt="Minimalist abstract geometric logo with sharp obsidian edges and metallic silver highlights, centered on a deep black background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKyTVwDNirQN0tHM5-DR2Ebwv2lyH4gNtI8ySm1GTEPon5xTxV8vTWWbeZ3jbWJtUVLjIy2mvY7_XwTjBTP0Dx9fYvvAL3hqyFVNK1AMe67mGPLwoYr6HMwMCjm4YDeNyuC2AB0uEEA0SdnVwEnqD1S_niMKzWHGDyIGG2Zy-WIBw_itARty5k0p6tSzi9DxZkr0dYyU4hQR2xlxHU8njWO6IHsYP6PWvVvgb4YT6-Y8Qb1ile2zjR46uzWM8nS1HNduDHCCuCfIo"/>
</div>
</div>
<!-- Content Header -->
<div class="text-center mb-10">
<h1 class="general-sans text-4xl md:text-5xl font-extrabold text-gradient mb-4">
                    Initialize Connection
                </h1>
<p class="body-lg text-on-surface-variant/70 font-light tracking-wide">
                    Connect your wallet to enter the Fintrix simulation.
                </p>
</div>
<!-- Connection Options -->
<div class="space-y-4">
<!-- Freighter Card -->
<button class="obsidian-card w-full flex items-center justify-between p-6 rounded-2xl border border-white/10 group">
<div class="flex items-center gap-5">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div class="text-left">
<span class="block text-lg font-semibold text-primary general-sans">Freighter</span>
<span class="block text-xs text-on-surface-variant/60 uppercase tracking-widest font-medium">Stellar Extension</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40 group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Albedo Card -->
<button class="obsidian-card w-full flex items-center justify-between p-6 rounded-2xl border border-white/10 group">
<div class="flex items-center gap-5">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="token">token</span>
</div>
<div class="text-left">
<span class="block text-lg font-semibold text-primary general-sans">Albedo</span>
<span class="block text-xs text-on-surface-variant/60 uppercase tracking-widest font-medium">Browser Wallet</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40 group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Action Prompt -->
<div class="mt-8 text-center">
<button class="text-on-surface-variant/50 hover:text-primary transition-colors text-sm font-medium underline underline-offset-4 decoration-white/20">
                    Trouble connecting? View Documentation
                </button>
</div>
</div>
</main>
<!-- Footer Area (JSON-inspired and Design System Aligned) -->
<footer class="w-full flex flex-col items-center gap-6 px-12 py-10 border-t border-white/5 bg-black">
<div class="flex items-center gap-2 text-on-surface-variant/40 uppercase tracking-[0.2em] text-[10px] font-bold">
<span class="material-symbols-outlined text-[14px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
            Secure Encryption Enabled
        </div>
<div class="flex justify-between items-center w-full max-w-[1440px]">
<span class="text-neutral-600 font-['Inter'] text-xs tracking-widest uppercase">© 2024 Fintrix Systems.</span>
<div class="flex gap-8">
<a class="text-neutral-600 hover:text-white transition-opacity text-xs tracking-widest uppercase" href="#">Terms</a>
<a class="text-neutral-600 hover:text-white transition-opacity text-xs tracking-widest uppercase" href="#">Privacy</a>
<a class="text-neutral-600 hover:text-white transition-opacity text-xs tracking-widest uppercase" href="#">Docs</a>
<a class="text-neutral-600 hover:text-white transition-opacity text-xs tracking-widest uppercase" href="#">Support</a>
</div>
</div>
</footer>
